<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Test</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #111827;
        font-family: sans-serif;
        color: #fff;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 14px;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .scenario {
        margin-bottom: 32px;
        max-width: 600px;
      }
      .controls {
        margin-bottom: 16px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      button {
        background: #374151;
        color: #fff;
        border: none;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover {
        background: #4b5563;
      }
      code {
        background: #1f2937;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 12px;
        color: #93c5fd;
      }
      .note {
        font-size: 12px;
        color: #6b7280;
        margin-bottom: 24px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <p class="note">
      1. Generate data:
      <code
        >cd apps/recent_detections &amp;&amp; python3 recent_detections.py
        --count 6</code
      ><br />
      2. Serve from repo root: <code>python3 -m http.server 8080</code><br />
      3. Open <code>http://localhost:8080/test_card.html</code>
    </p>

    <div class="controls">
      <button onclick="document.getElementById('card')._fetchAndUpdate()">Force refresh</button>
      <button onclick="simulateTrigger('person')">Trigger: person</button>
      <button onclick="simulateTrigger('vehicle')">Trigger: vehicle</button>
      <button onclick="simulateTrigger('animal')">Trigger: animal</button>
      <button onclick="simulateTrigger('package')">Trigger: package</button>
    </div>

    <div class="scenario">
      <h2>3-up grid / 6-up lightbox (tap card)</h2>
      <refreshable-tap-picture-card id="card"></refreshable-tap-picture-card>
    </div>

    <script src="apps/recent_detections/refreshable-tap-picture-card.js"></script>
    <script>
      const _realFetch = window.fetch.bind(window);
      let _mockData = null;

      // On the first fetch, load from disk and rewrite /local/unifi_events/ → output/.
      // After that, serve from the in-memory _mockData so simulateTrigger can mutate it.
      window.fetch = function (input, init) {
        if (typeof input === "string" && input.includes("recent.json")) {
          if (_mockData) {
            return Promise.resolve(
              new Response(JSON.stringify(_mockData), {
                headers: { "Content-Type": "application/json" },
              }),
            );
          }
          return _realFetch(input, init)
            .then((r) => r.json())
            .then((data) => {
              data.thumbnails = data.thumbnails.map((t) => ({
                ...t,
                url: t.url
                  ? t.url.replace("/local/unifi_events/", "output/")
                  : null,
              }));
              _mockData = data;
              return new Response(JSON.stringify(_mockData), {
                headers: { "Content-Type": "application/json" },
              });
            });
        }
        return _realFetch(input, init);
      };

      document.getElementById("card").setConfig({
        url: "output/recent.json",
        count: 3,
        lightbox_count: 9,
        cols: 3,
        refresh_interval: 10,
      });

      // Simulate a sensor trigger: null out the first thumbnail URL (placeholder state),
      // then restore it after 5 seconds (thumbnail ready state).
      function simulateTrigger(type) {
        if (!_mockData) return;
        // Prepend a pending placeholder of the given type
        const pending = { url: null, ts: new Date().toISOString(), type, camera: 'unknown', pending: true };
        _mockData.thumbnails.unshift(pending);
        document.getElementById("card")._fetchAndUpdate();
        // After 5 seconds, fill in the real URL from the next available thumbnail
        setTimeout(() => {
          const idx = _mockData.thumbnails.indexOf(pending);
          if (idx !== -1) {
            // Borrow a URL from a later entry to simulate thumbnail arriving
            const donor = _mockData.thumbnails.find((t, i) => i > idx && t.url);
            _mockData.thumbnails[idx] = {
              ...pending,
              url: donor ? donor.url : null,
              pending: false,
            };
            delete _mockData.thumbnails[idx].pending;
          }
          document.getElementById("card")._fetchAndUpdate();
        }, 5000);
      }
    </script>
  </body>
</html>
